pre-commit:
  commands:
    gofix:
      run: go fix ./...
      stage_fixed: true
    gofmt:
      glob: "*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true
    golangci-fix:
      glob: "*.go"
      run: scripts/hooks/precommit-golangci-fix.sh
      stage_fixed: true

pre-push:
  commands:
    gofix-check:
      run: make gofix-check
    lint:
      run: make lint-new
    test-unit:
      run: make test-unit
