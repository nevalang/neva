name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: setup go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
    - name: test (unit and non-e2e integration)
      run: |
        go list ./... \
          | grep -Ev '^github.com/nevalang/neva/(e2e|examples)(/|$)' \
          | xargs -r go test -v

  e2e_tests:
    needs: unit_tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: setup go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
    - name: test (e2e and examples)
      # Run with default Go package parallelism; isolation hardening is tracked in #1064.
      run: go test -v ./e2e/... ./examples/...
