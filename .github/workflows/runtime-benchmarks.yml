name: runtime benchmarks

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime_benchmarks:
    name: runtime benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: false
      - name: run runtime benchmark suite
        run: |
          mkdir -p artifacts/runtime-benchmarks
          make bench-runtime \
            | tee artifacts/runtime-benchmarks/current.txt
      - name: capture runtime benchmark metadata
        run: |
          {
            echo "event=${GITHUB_EVENT_NAME}"
            echo "sha=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "base_ref=${GITHUB_BASE_REF:-}"
            echo "head_ref=${GITHUB_HEAD_REF:-}"
            echo "runner_os=${RUNNER_OS}"
            echo "runner_arch=${RUNNER_ARCH}"
            echo "go_version=$(go version)"
            echo "date_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "command=make bench-runtime"
            echo "uname=$(uname -a)"
          } > artifacts/runtime-benchmarks/metadata.txt
      - name: note comparison workflow
        run: |
          {
            echo "This workflow uploads raw benchmark output as a downloadable artifact."
            echo "The suite is intentionally artifact-only for now: do not use GitHub-hosted runner deltas as a hard merge gate."
            echo "For this baseline PR there is no prior benchmark artifact produced by the repository yet."
            echo "To compare two runs, download their current.txt files and run: benchstat old.txt new.txt"
          } > artifacts/runtime-benchmarks/compare.txt
      - name: upload runtime benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-benchmarks-${{ github.sha }}
          path: artifacts/runtime-benchmarks
          if-no-files-found: error
