name: Release Marketing Telegram

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  send-release-update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OUTPUT_DIR: .opencode/context/release-marketing-output
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate required runtime configuration
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_API_TOKEN: ${{ secrets.TELEGRAM_BOT_API_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          test -n "$OPENROUTER_API_KEY" || { echo "Missing OPENROUTER_API_KEY secret"; exit 1; }
          test -n "$TELEGRAM_BOT_API_TOKEN" || { echo "Missing TELEGRAM_BOT_API_TOKEN secret"; exit 1; }
          test -n "$TELEGRAM_CHAT_ID" || { echo "Missing TELEGRAM_CHAT_ID secret"; exit 1; }
          mkdir -p "$OUTPUT_DIR"

      - name: Generate Telegram post with OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          model: openrouter/moonshotai/kimi-k2.5
          prompt: |
            Use the `release-telegram-post` skill.

            Generate a Telegram release post using this release payload:
            - Repository: ${{ github.repository }}
            - Tag: ${{ github.event.release.tag_name }}
            - Name: ${{ github.event.release.name }}
            - URL: ${{ github.event.release.html_url }}
            - Notes:
            ${{ github.event.release.body }}

            Save the final post body to `${{ env.OUTPUT_DIR }}/telegram-message.html`.
            Important: this file is sent as-is in Telegram API JSON `text` field; output body only, no wrappers.

      - name: Ensure generated message exists
        run: |
          set -euo pipefail
          test -s "${OUTPUT_DIR}/telegram-message.html" || {
            echo "Missing generated file: ${OUTPUT_DIR}/telegram-message.html"
            exit 1
          }

      - name: Validate generated message shape
        run: |
          set -euo pipefail
          FILE="${OUTPUT_DIR}/telegram-message.html"

          # Reject obvious non-production LLM wrappers and markdown fences.
          if grep -q '```' "$FILE"; then
            echo "Generated message contains markdown code fences."
            exit 1
          fi
          if head -n 1 "$FILE" | grep -Eiq "^(here( is|'s)|result:|output:|sure[,!:]?)"; then
            echo "Generated message starts with an LLM wrapper line."
            exit 1
          fi

      - name: Upload generated marketing artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-marketing-output
          path: ${{ env.OUTPUT_DIR }}

      - name: Send Telegram message
        env:
          TELEGRAM_BOT_API_TOKEN: ${{ secrets.TELEGRAM_BOT_API_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail

          MESSAGE="$(cat "${OUTPUT_DIR}/telegram-message.html")"
          test -n "$MESSAGE" || { echo "Generated message is empty"; exit 1; }

          payload="$(
            jq -n \
              --arg chat_id "$TELEGRAM_CHAT_ID" \
              --arg text "$MESSAGE" \
              '{
                chat_id: $chat_id,
                text: $text,
                parse_mode: "HTML",
                disable_web_page_preview: true
              }'
          )"

          curl --fail --silent --show-error \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_API_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$payload" >/dev/null
