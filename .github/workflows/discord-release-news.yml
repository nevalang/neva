name: Discord Release News

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag (for example v0.35.0)
        required: true
        type: string
      release_name:
        description: Optional release title override
        required: false
        default: ""
        type: string
      release_url:
        description: Public release URL
        required: true
        type: string
      release_body:
        description: Release notes markdown/body
        required: false
        default: ""
        type: string
      dry_run:
        description: Generate preview only without posting to Discord
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: discord-release-news-${{ github.event.release.tag_name || inputs.tag_name || github.run_id }}
  cancel-in-progress: false

jobs:
  discord-release-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare release context
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name || inputs.release_name }}
          RELEASE_URL: ${{ github.event.release.html_url || inputs.release_url }}
          RELEASE_BODY: ${{ github.event.release.body || inputs.release_body }}
          RELEASE_TARGET: ${{ github.event.release.target_commitish || github.ref_name }}
          RELEASE_AUTHOR: ${{ github.event.release.author.login || github.actor }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease || false }}
        run: |
          set -euo pipefail
          mkdir -p .tmp-release
          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "event_name": os.environ["EVENT_NAME"],
              "tag_name": os.environ["RELEASE_TAG"],
              "release_name": os.environ["RELEASE_NAME"],
              "release_url": os.environ["RELEASE_URL"],
              "release_body": os.environ["RELEASE_BODY"],
              "target_commitish": os.environ["RELEASE_TARGET"],
              "author": os.environ["RELEASE_AUTHOR"],
              "prerelease": os.environ["RELEASE_PRERELEASE"].lower() == "true",
          }
          Path(".tmp-release/release.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY

      - name: Install OpenCode CLI
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add OpenCode to PATH
        run: echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - name: Generate Discord post with OpenCode
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -euo pipefail
          cat > .tmp-release/discord-prompt.txt <<'EOF'
          You are writing a Discord announcement for the official Nevalang server news channel.

          Read the attached release metadata file and generate exactly one final Discord message.

          Requirements:
          - Output plain text only.
          - No code fences.
          - No markdown headings.
          - Max 1800 characters.
          - Open with the release tag or release title.
          - Summarize 2 to 5 high-signal changes from the provided release notes.
          - Preserve only claims supported by the provided release metadata.
          - If release notes are sparse, stay conservative and do not invent features.
          - End with a short call to action and the release URL.
          - Write in English.
          - Style should fit Discord news: concise, readable, mildly energetic, not corporate, not Telegram-like.
          EOF
          opencode run \
            --model openrouter/moonshotai/kimi-k2.5 \
            --format json \
            --file .tmp-release/release.json \
            "$(cat .tmp-release/discord-prompt.txt)" \
            > .tmp-release/opencode-events.jsonl

      - name: Extract generated post
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import sys
          from pathlib import Path

          chunks: list[str] = []
          for line in Path(".tmp-release/opencode-events.jsonl").read_text(encoding="utf-8").splitlines():
              if not line.strip():
                  continue
              event = json.loads(line)
              if event.get("type") != "text":
                  continue
              part = event.get("part", {})
              text = str(part.get("text", ""))
              if text:
                  chunks.append(text)

          message = "".join(chunks).strip()
          if not message:
              print("OpenCode did not produce a Discord post", file=sys.stderr)
              sys.exit(1)
          if len(message) > 1800:
              print(f"Discord post is too long: {len(message)} chars", file=sys.stderr)
              sys.exit(1)

          Path(".tmp-release/discord-post.txt").write_text(message + "\n", encoding="utf-8")
          print(message)
          PY

      - name: Post preview
        run: |
          echo "Generated Discord post:"
          echo "----------------------------------------"
          cat .tmp-release/discord-post.txt
          echo "----------------------------------------"

      - name: Send to Discord News webhook
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        env:
          DISCORD_NEWS_WEBHOOK_URL: ${{ secrets.DISCORD_NEWS_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_NEWS_WEBHOOK_URL}" ]; then
            echo "DISCORD_NEWS_WEBHOOK_URL secret is not configured"
            exit 1
          fi
          python3 <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          content = Path(".tmp-release/discord-post.txt").read_text(encoding="utf-8").strip()
          payload = json.dumps({"content": content}).encode("utf-8")
          request = urllib.request.Request(
              os.environ["DISCORD_NEWS_WEBHOOK_URL"],
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request) as response:
              if response.status != 204:
                  raise RuntimeError(f"Unexpected Discord webhook status: {response.status}")
          PY
